services:
  - type: web
    name: erp-agribusiness
    runtime: python
    plan: free
    buildCommand: pip install -r backend/requirements.txt
    startCommand: cd backend && uvicorn app:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: erp-db
          property: connectionString

databases:
  - name: erp-db
    plan: free
    databaseName: erp_agribusiness
